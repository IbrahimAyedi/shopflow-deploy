<div class="auth-split-page">

  <!-- ── Illustration Panel ─────────────────────────── -->
  <div class="auth-illustration-panel">
    <div class="panel-inner">
      <div class="panel-brand">
        <span class="panel-logo">ShopFlow</span>
        <span class="panel-tagline">Premium Marketplace</span>
      </div>
      <div class="panel-image-wrapper">
        <img
          class="panel-image"
          src="assets/illustrations/login-illustration.jpeg"
          alt="Welcome back to ShopFlow"
          title="Welcome back to ShopFlow"
        />
      </div>
      <div class="panel-copy">
        <h2>Welcome back to ShopFlow</h2>
        <p>Sign in to access your orders, cart, and personalized experience.</p>
      </div>
    </div>
  </div>

  <!-- ── Form Side ──────────────────────────────────── -->
  <div class="auth-form-side">
    <form class="auth-card" #loginForm="ngForm" (ngSubmit)="onSubmit()">

      <div class="auth-header">
        <h1>Sign in</h1>
        <p class="auth-subtitle">Enter your credentials to continue.</p>
      </div>

      <div class="form-group">
        <label for="login-email">Email address</label>
        <input
          id="login-email"
          name="email"
          type="email"
          required
          [(ngModel)]="credentials.email"
          autocomplete="email"
          placeholder="you@example.com"
        />
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input
          id="login-password"
          name="password"
          type="password"
          required
          [(ngModel)]="credentials.password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="loginForm.invalid || loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>

      <p class="auth-link">
        New to ShopFlow? <a routerLink="/register">Create an account</a>
      </p>

    </form>
  </div>

</div>
