# ─── Application ────────────────────────────────────────────────────────────
spring.application.name=shopflow

# ─── H2 In-Memory Database ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/shopflow-db;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── H2 Console (accessible at http://localhost:8080/h2-console) ─────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Allow remote H2 connections for dev/IDE access
spring.h2.console.settings.web-allow-others=true

# ─── Springdoc / Swagger UI ──────────────────────────────────────────────────
# API docs at default path: http://localhost:8080/v3/api-docs
# Swagger UI at:            http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Replace with a 256-bit+ secret in production (base64-encoded or raw string)
jwt.secret=shopflow-super-secret-key-do-not-use-in-production-replace-me
jwt.expiration=86400000
